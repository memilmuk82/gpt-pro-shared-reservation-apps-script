<script>
  async function handleCheckConflict() {
    clearAlert();

    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;

    if (!startTime || !endTime) {
      showAlert('시작 시간과 종료 예정 시간을 입력해 주세요.', 'warning');
      return;
    }

    try {
      setLoadingState(true);
      const response = await serverCall(
        'checkConflicts',
        localDateTimeToIso(startTime),
        localDateTimeToIso(endTime),
        ''
      );

      renderConflictResult(response);
    } catch (error) {
      showAlert('충돌 확인 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  async function handleCreateReservation() {
    clearAlert();

    const payload = buildReservationPayload(false);

    if (!payload) {
      return;
    }

    try {
      setLoadingState(true);
      const response = await serverCall('createReservation', payload);

      if (!response.ok) {
        if (response.data && response.data.conflicts) {
          renderConflictResult({
            ok: true,
            data: response.data.conflicts,
            message: response.message,
          });
        }

        showAlert(response.message, 'warning');
        return;
      }

      showAlert('예약이 등록되었습니다.', 'success');
      await loadInitialData();
      window.location.hash = '#mine';
    } catch (error) {
      showAlert('예약 등록 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  async function handleCreateImmediateReservation() {
    clearAlert();

    const payload = buildReservationPayload(true);

    if (!payload) {
      return;
    }

    try {
      setLoadingState(true);
      const response = await serverCall('createImmediateReservation', payload);

      if (!response.ok) {
        if (response.data && response.data.conflicts) {
          renderConflictResult({
            ok: true,
            data: response.data.conflicts,
            message: response.message,
          });
        }

        showAlert(response.message, 'warning');
        return;
      }

      showAlert('즉시 사용 시작으로 등록되었습니다.', 'success');
      await loadInitialData();
      window.location.hash = '#home';
    } catch (error) {
      showAlert('즉시 사용 시작 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  async function handleLoadReservationsByDate() {
    const date = document.getElementById('reservationDate').value;

    if (!date) {
      showAlert('날짜를 선택해 주세요.', 'warning');
      return;
    }

    try {
      setLoadingState(true);
      const response = await serverCall('getReservationsByDate', date);

      if (!response.ok) {
        showAlert(response.message, 'error');
        return;
      }

      state.selectedReservationDate = date;
      state.data.todayReservations = response.data;
      renderReservationsView();
    } catch (error) {
      showAlert('예약 조회 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  async function handleStartReservation(reservationId) {
    await runReservationAction('startReservation', reservationId, '사용 시작 처리 완료');
  }

  async function handleCompleteReservation(reservationId) {
    await runReservationAction('completeReservation', reservationId, '사용 완료 처리 완료');
  }

  async function handleCancelReservation(reservationId) {
    const reservation = findReservationInClientState(reservationId);

    const message = reservation
      ? buildReservationCancelConfirmMessage(reservation)
      : '예약을 취소하시겠습니까?';

    const confirmed = await showConfirmModal({
      title: '예약 취소',
      message: message,
      confirmText: '예약 취소',
      cancelText: '돌아가기',
      danger: true,
    });

    if (!confirmed) {
      return;
    }

    await runReservationAction('cancelReservation', reservationId, '예약 취소 완료');
  }


  async function handleSecurityButtonClick(event) {
    const button = event.target.closest('[data-security-action]');

    if (!button) {
      return;
    }

    event.preventDefault();

    const action = button.dataset.securityAction;

    if (action === 'lock') {
      await handleManualScreenLock();
    }
  }


  async function handleManualScreenLock() {
    const confirmed = await showConfirmModal({
      title: '사용 종료',
      message: [
        '예약 시스템 화면을 잠그시겠습니까?',
        '',
        '공용 PC에서는 화면 잠금 후 GPT와 Google 계정 로그아웃 여부를 반드시 확인해야 합니다.',
      ].join('\n'),
      confirmText: '화면 잠금',
      cancelText: '돌아가기',
      danger: false,
    });

    if (!confirmed) {
      return;
    }

    lockApplication('manual');
  }

  async function handleLoadStats() {
    const area = document.getElementById('adminResultArea');

    area.innerHTML = card(`
      <p class="text-slate-600">통계를 불러오는 중입니다...</p>
    `);

    try {
      const response = await serverCall('getStats');

      if (!response.ok) {
        area.innerHTML = card(`
          <p class="text-rose-700 font-semibold">${escapeHtml(response.message)}</p>
        `);
        return;
      }

      area.innerHTML = renderStats(response.data);
    } catch (error) {
      area.innerHTML = card(`
        <p class="text-rose-700 font-semibold">통계 조회 실패: ${escapeHtml(error.message)}</p>
      `);
    }
  }

  async function handleRunAllTests() {
    const area = document.getElementById('adminResultArea');

    area.innerHTML = card(`
      <p class="text-slate-600">전체 테스트를 실행하는 중입니다...</p>
    `);

    try {
      const response = await serverCall('adminRunAllTests');

      area.innerHTML = renderTestResults(response);
    } catch (error) {
      area.innerHTML = card(`
        <p class="text-rose-700 font-semibold">테스트 실행 실패: ${escapeHtml(error.message)}</p>
      `);
    }
  }

  async function handleCreateRegistrationRequest() {
    clearAlert();

    const name = document.getElementById('requestName').value.trim();
    const department = document.getElementById('requestDepartment').value.trim();
    const extension = document.getElementById('requestExtension').value.trim();

    if (!name) {
      showAlert('이름을 입력해 주세요.', 'warning');
      return;
    }

    if (!department) {
      showAlert('부서를 입력해 주세요.', 'warning');
      return;
    }

    try {
      setLoadingState(true);

      const response = await serverCall('createRegistrationRequest', {
        name: name,
        department: department,
        extension: extension,
      });

      if (!response.ok) {
        showAlert(response.message, 'warning');
        return;
      }

      showAlert('등록 요청이 접수되었습니다.', 'success');
      await loadInitialData();
    } catch (error) {
      showAlert('등록 요청 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  async function handleLoadRegistrationRequests() {
    const area = document.getElementById('adminResultArea');

    area.innerHTML = card(`
      <p class="text-slate-600">등록 요청을 불러오는 중입니다...</p>
    `);

    try {
      const response = await serverCall('adminGetRegistrationRequests');

      if (!response.ok) {
        area.innerHTML = card(`
          <p class="text-rose-700 font-semibold">${escapeHtml(response.message)}</p>
        `);
        return;
      }

      state.adminRegistrationRequests = response.data || [];
      area.innerHTML = renderRegistrationRequests(state.adminRegistrationRequests);
      bindRegistrationRequestButtons();
    } catch (error) {
      area.innerHTML = card(`
        <p class="text-rose-700 font-semibold">등록 요청 조회 실패: ${escapeHtml(error.message)}</p>
      `);
    }
  }

  async function handleLoadUsers() {
    const area = document.getElementById('adminResultArea');

    area.innerHTML = card(`
      <p class="text-slate-600">사용자 목록을 불러오는 중입니다...</p>
    `);

    try {
      setLoadingState(true);

      const response = await serverCall('adminGetUsers');

      if (!response.ok) {
        area.innerHTML = card(`
          <p class="text-rose-700 font-semibold">${escapeHtml(response.message)}</p>
        `);
        return;
      }

      state.adminUsers = response.data || [];
      state.adminUserFormMode = null;
      state.adminUserFormData = null;
      resetAdminUserBulkCreateState();

      area.innerHTML = renderUserManagement(state.adminUsers);
      bindUserManagementButtons();
    } catch (error) {
      area.innerHTML = card(`
        <p class="text-rose-700 font-semibold">사용자 목록 조회 실패: ${escapeHtml(error.message)}</p>
      `);
    } finally {
      setLoadingState(false);
    }
  }


  function bindUserManagementButtons() {
    document.querySelectorAll('[data-user-action]').forEach(button => {
      button.addEventListener('click', () => {
        const action = button.dataset.userAction;
        const userId = button.dataset.userId;

        if (action === 'create') {
          handleShowCreateUserForm();
        }

        if (action === 'edit') {
          handleShowEditUserForm(userId);
        }

        if (action === 'toggleActive') {
          handleToggleUserActive(userId);
        }
      });
    });

    const saveButton = document.getElementById('saveUserButton');
    const cancelButton = document.getElementById('cancelUserFormButton');
    const bulkCsvInput = document.getElementById('adminUserBulkCsvInput');
    const bulkSubmitButton = document.getElementById('submitUserBulkCreateButton');
    const bulkClearButton = document.getElementById('clearUserBulkCreateButton');

    if (saveButton) {
      saveButton.addEventListener('click', handleSaveUserForm);
    }

    if (cancelButton) {
      cancelButton.addEventListener('click', handleCancelUserForm);
    }

    if (bulkCsvInput) {
      bulkCsvInput.addEventListener('change', handleUserBulkCsvFileChange);
    }

    if (bulkSubmitButton) {
      bulkSubmitButton.addEventListener('click', handleSubmitUserBulkCreate);
    }

    if (bulkClearButton) {
      bulkClearButton.addEventListener('click', handleClearUserBulkCreate);
    }
  }


  function rerenderUserManagement() {
    const area = document.getElementById('adminResultArea');

    area.innerHTML = renderUserManagement(state.adminUsers || []);
    bindUserManagementButtons();
  }


  function handleShowCreateUserForm() {
    state.adminUserFormMode = 'create';
    state.adminUserFormData = {
      user_id: '',
      email: '',
      name: '',
      department: '',
      extension: '',
      role: 'user',
      active: true,
      is_auth_manager: false,
      sort_order: '',
    };

    rerenderUserManagement();
  }


  function handleShowEditUserForm(userId) {
    const user = findAdminUserInState(userId);

    if (!user) {
      showAlert('사용자를 찾을 수 없습니다.', 'warning');
      return;
    }

    state.adminUserFormMode = 'edit';
    state.adminUserFormData = user;

    rerenderUserManagement();
  }


  function handleCancelUserForm() {
    state.adminUserFormMode = null;
    state.adminUserFormData = null;

    rerenderUserManagement();
  }


  function resetAdminUserBulkCreateState() {
    state.adminUserBulkRows = [];
    state.adminUserBulkResults = [];
    state.adminUserBulkFileName = '';
  }


  async function handleUserBulkCsvFileChange(event) {
    clearAlert();

    const file = event.target.files && event.target.files[0]
      ? event.target.files[0]
      : null;

    if (!file) {
      return;
    }

    const fileName = String(file.name || '').trim();

    if (fileName && !fileName.toLowerCase().endsWith('.csv')) {
      showAlert('CSV 파일만 업로드할 수 있습니다.', 'warning');
      return;
    }

    try {
      const text = await readAdminUserBulkCsvFile_(file);
      const rows = parseAdminUserBulkCsv_(text);

      state.adminUserBulkRows = rows;
      state.adminUserBulkResults = [];
      state.adminUserBulkFileName = fileName;

      rerenderUserManagement();
      showAlert('CSV ' + rows.length + '행을 불러왔습니다. 서버 검증 후 일괄 등록을 진행하세요.', 'success');
    } catch (error) {
      resetAdminUserBulkCreateState();
      rerenderUserManagement();
      showAlert('CSV 파일 처리 실패: ' + error.message, 'warning');
    }
  }


  function handleClearUserBulkCreate() {
    resetAdminUserBulkCreateState();
    rerenderUserManagement();
    showAlert('CSV 미리보기를 초기화했습니다.', 'info');
  }


  async function handleSubmitUserBulkCreate() {
    clearAlert();

    const rows = state.adminUserBulkRows || [];

    if (rows.length === 0) {
      showAlert('먼저 CSV 파일을 선택해 주세요.', 'warning');
      return;
    }

    const confirmed = await showConfirmModal({
      title: '사용자 CSV 일괄 등록',
      message: [
        'CSV 사용자 ' + rows.length + '명을 일괄 등록하시겠습니까?',
        '',
        '서버 검증에서 하나라도 실패하면 어떤 사용자도 저장하지 않습니다.',
      ].join('\n'),
      confirmText: '일괄 등록',
      cancelText: '돌아가기',
      danger: false,
    });

    if (!confirmed) {
      return;
    }

    try {
      setLoadingState(true);

      const response = await serverCall('adminBulkCreateUsers', {
        users: rows,
      });

      state.adminUserBulkResults =
        response &&
        response.data &&
        Array.isArray(response.data.results)
          ? response.data.results
          : [];

      if (!response.ok) {
        rerenderUserManagement();
        showAlert(buildAdminUserBulkCreateResultMessage_(response), 'warning');
        return;
      }

      const createdCount =
        response.data && response.data.created_count !== undefined
          ? response.data.created_count
          : rows.length;

      showAlert('사용자 ' + createdCount + '명을 일괄 등록했습니다.', 'success');
      await handleLoadUsers();
    } catch (error) {
      showAlert('사용자 CSV 일괄 등록 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }


  function readAdminUserBulkCsvFile_(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();

      reader.onload = function() {
        resolve(String(reader.result || ''));
      };

      reader.onerror = function() {
        reject(new Error('CSV 파일을 읽을 수 없습니다.'));
      };

      reader.readAsText(file, 'UTF-8');
    });
  }


  function parseAdminUserBulkCsv_(text) {
    const csvRows = parseAdminUserBulkCsvRows_(text);

    if (csvRows.length === 0) {
      throw new Error('CSV 데이터가 없습니다.');
    }

    const expectedHeaders = [
      'email',
      'name',
      'department',
      'extension',
      'role',
      'active',
      'is_auth_manager',
      'sort_order',
    ];

    const headers = csvRows[0].map(normalizeAdminUserBulkHeader_);
    const headerMap = {};

    headers.forEach(function(header, index) {
      if (header && headerMap[header] === undefined) {
        headerMap[header] = index;
      }
    });

    const missingHeaders = expectedHeaders.filter(function(header) {
      return headerMap[header] === undefined;
    });

    if (missingHeaders.length > 0) {
      throw new Error('필수 CSV 컬럼이 없습니다: ' + missingHeaders.join(', '));
    }

    const users = [];

    for (let rowIndex = 1; rowIndex < csvRows.length; rowIndex++) {
      const csvRow = csvRows[rowIndex] || [];
      const hasValue = csvRow.some(function(cell) {
        return String(cell || '').trim() !== '';
      });

      if (!hasValue) {
        continue;
      }

      const item = {
        row_number: rowIndex + 1,
      };

      expectedHeaders.forEach(function(header) {
        const cellIndex = headerMap[header];
        item[header] = String(csvRow[cellIndex] ?? '').trim();
      });

      users.push(item);
    }

    if (users.length === 0) {
      throw new Error('등록할 사용자 행이 없습니다.');
    }

    return users;
  }


  function parseAdminUserBulkCsvRows_(text) {
    const source = String(text || '').replace(/^\uFEFF/, '');
    const rows = [];
    let row = [];
    let cell = '';
    let inQuotes = false;

    for (let i = 0; i < source.length; i++) {
      const char = source[i];

      if (char === '"') {
        if (inQuotes && source[i + 1] === '"') {
          cell += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }

        continue;
      }

      if (char === ',' && !inQuotes) {
        row.push(cell);
        cell = '';
        continue;
      }

      if ((char === '\n' || char === '\r') && !inQuotes) {
        if (char === '\r' && source[i + 1] === '\n') {
          i++;
        }

        row.push(cell);
        rows.push(row);
        row = [];
        cell = '';
        continue;
      }

      cell += char;
    }

    if (inQuotes) {
      throw new Error('CSV 따옴표가 닫히지 않았습니다.');
    }

    if (cell !== '' || row.length > 0) {
      row.push(cell);
      rows.push(row);
    }

    return rows;
  }


  function normalizeAdminUserBulkHeader_(header) {
    return String(header || '').replace(/^\uFEFF/, '').trim().toLowerCase();
  }


  function buildAdminUserBulkCreateResultMessage_(response) {
    const results =
      response &&
      response.data &&
      Array.isArray(response.data.results)
        ? response.data.results
        : [];

    const failedMessages = results
      .filter(function(result) {
        return result && result.ok === false;
      })
      .map(function(result) {
        return result.message || ('행 ' + result.row_number + ': 검증 실패');
      })
      .filter(function(message) {
        return message;
      });

    if (failedMessages.length === 0) {
      return response && response.message
        ? response.message
        : 'CSV 일괄 등록 검증에 실패했습니다.';
    }

    return failedMessages.join('\n');
  }


  async function handleSaveUserForm() {
    clearAlert();

    const mode = document.getElementById('userFormMode').value;
    const userId = document.getElementById('userId').value;
    const payload = buildAdminUserPayload(mode);

    if (!payload) {
      return;
    }

    try {
      setLoadingState(true);

      const response = mode === 'create'
        ? await serverCall('adminCreateUser', payload)
        : await serverCall('adminUpdateUser', userId, payload);

      if (!response.ok) {
        showAlert(response.message, 'warning');
        return;
      }

      showAlert(mode === 'create' ? '사용자를 추가했습니다.' : '사용자 정보를 수정했습니다.', 'success');

      await handleLoadUsers();
    } catch (error) {
      showAlert('사용자 저장 실패: ' + error.message, 'error');
    } finally {
      setLoadingState(false);
    }
  }


  function buildAdminUserPayload(mode) {
    const email = document.getElementById('userEmail').value.trim();
    const name = document.getElementById('userName').value.trim();
    const department = document.getElementById('userDepartment').value.trim();
    const extension = document.getElementById('userExtension').value.trim();
    const role = document.getElementById('userRole').value;
    const active = document.getElementById('userActive').checked;
    const isAuthManager = document.getElementById('userIsAuthManager').checked;
    const sortOrderRaw = document.getElementById('userSortOrder').value;

    if (mode === 'create' && !email) {
      showAlert('이메일을 입력해 주세요.', 'warning');
      return null;
    }

    if (!name) {
      showAlert('이름을 입력해 주세요.', 'warning');
      return null;
    }

    if (!department) {
      showAlert('부서를 입력해 주세요.', 'warning');
      return null;
    }

    if (mode === 'edit') {
      const userId = document.getElementById('userId').value;
      const currentUser = findAdminUserInState(userId);

      if (
        isLastActiveAdminUser(currentUser, state.adminUsers || []) &&
        (role !== 'admin' || active !== true)
      ) {
        showAlert('최소 1명의 활성 관리자는 유지되어야 합니다.', 'warning');
        return null;
      }
    }

    const payload = {
      department: department,
      name: name,
      extension: extension,
      email: email,
      role: role,
      active: active,
      is_auth_manager: isAuthManager,
      sort_order: sortOrderRaw === '' ? '' : Number(sortOrderRaw),
    };

    return payload;
  }


  async function handleToggleUserActive(userId) {
    const user = findAdminUserInState(userId);

    if (!user) {
      showAlert('사용자를 찾을 수 없습니다.', 'warning');
      return;
    }

    if (isLastActiveAdminUser(user, state.adminUsers || [])) {
      showAlert('최소 1명의 활성 관리자는 유지되어야 합니다.', 'warning');
      return;
    }

    const nextActive = !user.active;
    const roleLabel = getUserRoleLabel(user.role);

    const message = nextActive
      ? [
          '아래 사용자를 활성화하시겠습니까?',
          '',
          '이름: ' + (user.name || '-'),
          '부서: ' + (user.department || '-'),
          '이메일: ' + (user.email || '-'),
          '권한: ' + roleLabel,
          '',
          '활성화 후 해당 사용자는 예약 시스템을 사용할 수 있습니다.',
        ].join('\n')
      : [
          '아래 사용자를 비활성화하시겠습니까?',
          '',
          '이름: ' + (user.name || '-'),
          '부서: ' + (user.department || '-'),
          '이메일: ' + (user.email || '-'),
          '권한: ' + roleLabel,
          '',
          '비활성화된 사용자는 예약 시스템을 사용할 수 없습니다.',
          '기존 예약 및 사용 기록은 삭제되지 않습니다.',
        ].join('\n');

    const confirmed = await showConfirmModal({
      title: nextActive ? '사용자 활성화' : '사용자 비활성화',
      message: message,
      confirmText: nextActive ? '활성화' : '비활성화',
      cancelText: '돌아가기',
      danger: !nextActive,
    });

    if (!confirmed) {
      return;
    }

    try {
      setLoadingState(true);

      const response = nextActive
        ? await serverCall('adminUpdateUser', userId, { active: true })
        : await serverCall('adminDeactivateUser', userId);

      if (!response.ok) {
        showAlert(response.message, 'warning');
        return;
      }

      showAlert(
        nextActive
          ? '사용자를 활성화했습니다.'
          : '사용자를 비활성화했습니다.',
        'success'

  function buildReservationPayload(immediate) {
    const workType = document.getElementById('workType').value;
    const workTitle = document.getElementById('workTitle').value.trim();
    const workDescription = document.getElementById('workDescription').value.trim();
    const expectedMinutes = getSelectedDurationMinutes();

    const safetyConfirmed = [
      'safePrivacy',
      'safeExam',
      'safeRecord',
      'safeStudentText',
    ].every(id => document.getElementById(id).checked);

    if (!workType) {
      showAlert('작업 유형을 선택해 주세요.', 'warning');
      return null;
    }

    if (!workTitle) {
      showAlert('작업명을 입력해 주세요.', 'warning');
      return null;
    }

    if (!safetyConfirmed) {
      showAlert('사용 전 확인 사항에 모두 동의해야 합니다.', 'warning');
      return null;
    }

    if (!Number.isFinite(expectedMinutes) || expectedMinutes < 30) {
      showAlert('사용 시간은 30분 이상으로 입력해 주세요.', 'warning');
      return null;
    }

    const conflictAck = document.getElementById('conflictAcknowledged')
      ? document.getElementById('conflictAcknowledged').checked
      : false;

    const payload = {
      work_type: workType,
      work_title: workTitle,
      work_description: workDescription,
      expected_minutes: expectedMinutes,
      safety_confirmed: true,
      conflict_acknowledged: conflictAck,
    };

    if (!immediate) {
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;

      if (!startTime || !endTime) {
        showAlert('예약 등록은 시작 시간과 종료 예정 시간이 필요합니다.', 'warning');
        return null;
      }

      payload.start_time = localDateTimeToIso(startTime);
      payload.end_time = localDateTimeToIso(endTime);
    }

    return payload;
  }

  function initializeApplyTimeControls() {
    const startInput = document.getElementById('startTime');
    const endInput = document.getElementById('endTime');
    const durationInput = document.getElementById('expectedMinutes');
    const customDurationInput = document.getElementById('customDurationMinutes');

    if (!startInput || !endInput || !durationInput) {
      return;
    }

    if (!startInput.value) {
      startInput.value = toDateTimeLocalValue(roundDateUpToMinutes(new Date(), 5));
    }

    handleDurationModeChange();
    updateEndTimeFromDuration();

    startInput.addEventListener('change', function() {
      updateEndTimeFromDuration();
      clearConflictArea();
    });

    durationInput.addEventListener('change', function() {
      handleDurationModeChange();
      updateEndTimeFromDuration();
      clearConflictArea();
    });

    if (customDurationInput) {
      customDurationInput.addEventListener('input', function() {
        updateEndTimeFromDuration();
        clearConflictArea();
      });
    }

    endInput.addEventListener('change', function() {
      clearConflictArea();
    });
  }

  function handleDurationModeChange() {
    const durationInput = document.getElementById('expectedMinutes');
    const customDurationArea = document.getElementById('customDurationArea');
    const customDurationInput = document.getElementById('customDurationMinutes');

    if (!durationInput || !customDurationArea) {
      return;
    }

    const isCustom = durationInput.value === 'custom';

    customDurationArea.classList.toggle('hidden', !isCustom);

    if (isCustom && customDurationInput && !customDurationInput.value) {
      customDurationInput.value = '240';
    }

    updateDurationNotice();
  }


  function getSelectedDurationMinutes() {
    const durationInput = document.getElementById('expectedMinutes');
    const customDurationInput = document.getElementById('customDurationMinutes');

    if (!durationInput) {
      return 60;
    }

    if (durationInput.value === 'custom') {
      return Number(customDurationInput ? customDurationInput.value : 0);
    }

    return Number(durationInput.value || 60);
  }


  function updateDurationNotice() {
    const durationNotice = document.getElementById('durationNotice');

    if (!durationNotice) {
      return;
    }

    const minutes = getSelectedDurationMinutes();
    const maxDuration = getAppSettingNumber(
      'max_duration_minutes',
      180
    );

    durationNotice.classList.toggle(
      'hidden',
      !Number.isFinite(minutes) || minutes <= maxDuration
    );
  }

  function updateEndTimeFromDuration() {
    const startInput = document.getElementById('startTime');
    const endInput = document.getElementById('endTime');

    if (!startInput || !endInput) {
      return;
    }

    if (!startInput.value) {
      return;
    }

    const startDate = new Date(startInput.value);
    const minutes = getSelectedDurationMinutes();

    updateDurationNotice();

    if (isNaN(startDate.getTime()) || !Number.isFinite(minutes) || minutes < 30) {
      return;
    }

    const endDate = new Date(startDate.getTime() + minutes * 60 * 1000);

    endInput.value = toDateTimeLocalValue(endDate);
  }

  function markFailedAdminSettingRows(response) {
    const results =
      response &&
      response.data &&
      Array.isArray(response.data.results)
        ? response.data.results
        : [];

    results.forEach(result => {
      if (!result || result.ok !== false) {
        return;
      }

      const key =
        result.data && result.data.setting_key
          ? result.data.setting_key
          : '';

      if (!key) {
        return;
      }

      const row = document.querySelector(
        `[data-setting-row="${CSS.escape(key)}"]`
      );

      if (!row) {
        return;
      }

      row.classList.remove('border-amber-300', 'bg-amber-50');
      row.classList.add('border-rose-300', 'bg-rose-50');
    });
  }

  function buildAdminSettingsErrorMessage(response) {
    const results =
      response &&
      response.data &&
      Array.isArray(response.data.results)
        ? response.data.results
        : [];

    const failedMessages = results
      .filter(result => result && result.ok === false)
      .map(result => result.message)
      .filter(message => message);

    if (failedMessages.length === 0) {
      return response && response.message
        ? response.message
        : '설정 저장에 실패했습니다.';
    }

    return failedMessages.join('\n');
  }

  function collectChangedAdminSettings() {
    const changedItems = [];

    document.querySelectorAll('[data-setting-row]').forEach(row => {
      const settingKey = row.dataset.settingRow;
      const input = row.querySelector('[data-setting-input]');

      if (!settingKey || !input) {
        return;
      }

      const original = getAdminSettingOriginalValue(settingKey);
      const current = String(input.value ?? '');

      if (current !== original) {
        changedItems.push({
          setting_key: settingKey,
          setting_value: current,
        });
      }
    });

    return changedItems;
  }

  function getAdminSettingOriginalValue(settingKey) {
    const key = String(settingKey || '').trim();
    const settings = state.adminSettings || [];

    for (const setting of settings) {
      if (String(setting.setting_key || '').trim() === key) {
        return String(setting.setting_value ?? '');
      }
    }

    return '';
  }

  function applyUpdatedSettingsToClientState(items) {
    if (!state.data) {
      state.data = {};
    }

    if (!state.data.settings) {
      state.data.settings = {};
    }

    items.forEach(item => {
      const key = String(item.setting_key || '').trim();
      const value = String(item.setting_value ?? '');

      if (!key) {
        return;
      }

      state.data.settings[key] = value;

      const settings = state.adminSettings || [];

      for (const setting of settings) {
        if (String(setting.setting_key || '').trim() === key) {
          setting.setting_value = value;
          break;
        }
      }
    });
  }

  function collectChangedAdminGuideItems() {
    const changedItems = [];

    document.querySelectorAll('[data-guide-row]').forEach(row => {
      const guideId = row.dataset.guideRow;
      const original = getAdminGuideItemOriginalValue(guideId);

      if (!guideId || !original) {
        return;
      }

      const payload = {
        guide_id: guideId,
      };
      let hasChanged = false;

      row.querySelectorAll('[data-guide-field]').forEach(input => {
        const field = input.dataset.guideField;
        const current = getAdminGuideInputValue(input);
        const originalValue = getAdminGuideOriginalFieldValue(original, field);

        if (current === originalValue) {
          return;
        }

        hasChanged = true;

        if (field === 'active') {
          payload[field] = current === 'true';
          return;
        }

        if (field === 'sort_order') {
          const numberValue = Number(current);
          payload[field] = current === '' || Number.isFinite(numberValue)
            ? (current === '' ? '' : numberValue)
            : current;
          return;
        }

        payload[field] = current;
      });

      if (hasChanged) {
        changedItems.push(payload);
      }
    });

    return changedItems;
  }


  function getAdminGuideInputValue(input) {
    if (!input) {
      return '';
    }

    if (input.type === 'checkbox') {
      return input.checked ? 'true' : 'false';
    }

    return String(input.value ?? '');
  }


  function getAdminGuideItemOriginalValue(guideId) {
    const targetId = String(guideId || '').trim();
    const guides = state.adminGuideItems || [];

    for (const guide of guides) {

  function getAdminGuideOriginalFieldValue(guide, field) {
    if (!guide || !field) {
      return '';
    }

    if (field === 'active') {
      return guide.active === true ? 'true' : 'false';
    }

    if (field === 'sort_order') {
      if (guide.sort_order === '' || guide.sort_order === null || guide.sort_order === undefined) {
        return '';
      }

      return String(Number(guide.sort_order));
    }

    return String(guide[field] ?? '');
  }

      })
      .filter(message => message);

    if (failedMessages.length === 0) {
      return response && response.message
        ? response.message
        : '안내 문구 저장에 실패했습니다.';
    }

    return failedMessages.join('\n');
  }


  function applyUpdatedGuideItemsToClientState(items) {
    const updates = Array.isArray(items) ? items : [];

    updates.forEach(item => {
      const guideId = String(item.guide_id || '').trim();

      if (!guideId) {
        return;
      }

      const guides = state.adminGuideItems || [];
      let found = false;

      for (const guide of guides) {
        if (String(guide.guide_id || '').trim() === guideId) {
          Object.assign(guide, item);
          found = true;
          break;
        }
      }

      if (!found) {
        guides.push(item);
      }

      state.adminGuideItems = guides;
    });

    state.adminGuideItems = (state.adminGuideItems || []).sort(sortAdminGuideItemsForClient);

    if (!state.data) {
      state.data = {};
    }

    state.data.guides = (state.adminGuideItems || [])
      .filter(item => item.active === true)
      .map(item => Object.assign({}, item))
      .sort(sortAdminGuideItemsForClient);
  }


  function sortAdminGuideItemsForClient(a, b) {
    const orderA = getAdminGuideSortOrderForClient(a);
    const orderB = getAdminGuideSortOrderForClient(b);

    if (orderA !== orderB) {
      return orderA - orderB;
    }

    return String((a && a.title) || '').localeCompare(
      String((b && b.title) || ''),
      'ko'
    );
  }


  function getAdminGuideSortOrderForClient(item) {
    if (!item || item.sort_order === '' || item.sort_order === null || item.sort_order === undefined) {
      return 999999;
    }

    const order = Number(item.sort_order);

    return Number.isFinite(order) ? order : 999999;
  }
   

  function applyUpdatedSettingToClientState(settingKey, settingValue) {
    const key = String(settingKey || '').trim();

    if (!key) {
      return;
    }

    if (!state.data) {
      state.data = {};
    }

    if (!state.data.settings) {
      state.data.settings = {};
    }

    state.data.settings[key] = String(settingValue ?? '');

    const settings = state.adminSettings || [];

    for (const setting of settings) {
      if (String(setting.setting_key || '').trim() === key) {
        setting.setting_value = String(settingValue ?? '');
        break;
      }
    }

    if (key === 'app_title' || key === 'organization_name') {
      renderHeader();
    }
  }

  function markSettingRowSaved(row) {
    if (!row) {
      return;
    }

    row.classList.add('border-emerald-300', 'bg-emerald-50');

    setTimeout(function() {
      row.classList.remove('border-emerald-300', 'bg-emerald-50');
    }, 1200);
  }
</script>
